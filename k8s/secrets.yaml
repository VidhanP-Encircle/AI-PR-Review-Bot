apiVersion: v1
kind: Secret
metadata:
  name: ai-reviewer-secrets
  namespace: ai-reviewer
  labels:
    app.kubernetes.io/name: ai-reviewer
    app.kubernetes.io/part-of: ai-pr-reviewer
type: Opaque
stringData:
  # AI Provider API Keys — set these via kubectl or Helm values
  # kubectl create secret generic ai-reviewer-secrets --namespace ai-reviewer \
  #   --from-literal=gemini-api-key=your_key_here \
  #   --from-literal=anthropic-api-key=your_key_here \
  #   --from-literal=openrouter-api-key=your_key_here \
  #   --from-literal=github-token=your_token_here \
  #   --from-literal=github-webhook-secret=your_webhook_secret \
  #   --from-literal=postgres-password=your_db_password \
  #   --from-literal=redis-password=your_redis_password \
  #   --from-literal=nextauth-secret=your_nextauth_secret
  #   --from-literal=cookie-secret=your_cookie_secret
  gemini-api-key: ""
  anthropic-api-key: ""
  openrouter-api-key: ""
  github-token: ""
  github-webhook-secret: ""
  postgres-password: ""
  redis-password: ""
  nextauth-secret: ""
  cookie-secret: ""
---
apiVersion: v1
kind: Secret
metadata:
  name: postgres-secrets
  namespace: ai-reviewer
  labels:
    app.kubernetes.io/name: postgres
    app.kubernetes.io/part-of: ai-pr-reviewer
type: Opaque
stringData:
  postgres-password: ""
  postgres-user: "postgres"
