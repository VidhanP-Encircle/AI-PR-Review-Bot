apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-reviewer-server
  namespace: ai-reviewer
  labels:
    app.kubernetes.io/name: ai-reviewer
    app.kubernetes.io/component: server
    app.kubernetes.io/part-of: ai-pr-reviewer
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: ai-reviewer
      app.kubernetes.io/component: server
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ai-reviewer
        app.kubernetes.io/component: server
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3000"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: server
          image: ghcr.io/your-org/ai-pr-reviewer/server:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
              name: http
              protocol: TCP
          envFrom:
            - configMapRef:
                name: ai-reviewer-config
          env:
            - name: GEMINI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: ai-reviewer-secrets
                  key: gemini-api-key
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: ai-reviewer-secrets
                  key: anthropic-api-key
            - name: OPENROUTER_API_KEY
              valueFrom:
                secretKeyRef:
                  name: ai-reviewer-secrets
                  key: openrouter-api-key
            - name: GITHUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: ai-reviewer-secrets
                  key: github-token
            - name: GITHUB_WEBHOOK_SECRET
              valueFrom:
                secretKeyRef:
                  name: ai-reviewer-secrets
                  key: github-webhook-secret
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ai-reviewer-secrets
                  key: redis-password
            - name: NEXTAUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: ai-reviewer-secrets
                  key: nextauth-secret
            - name: COOKIE_SECRET
              valueFrom:
                secretKeyRef:
                  name: ai-reviewer-secrets
                  key: cookie-secret
            # POSTGRES_PASSWORD must be defined BEFORE DATABASE_URL for K8s $(VAR) substitution
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secrets
                  key: postgres-password
            - name: DATABASE_URL
              value: "postgresql://postgres:$(POSTGRES_PASSWORD)@postgres:5432/ai_reviewer?schema=public"
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "2000m"
              memory: "2Gi"
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          startupProbe:
            httpGet:
              path: /api/v1/health
              port: 3000
            failureThreshold: 30
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: ai-reviewer-server
  namespace: ai-reviewer
  labels:
    app.kubernetes.io/name: ai-reviewer
    app.kubernetes.io/component: server
    app.kubernetes.io/part-of: ai-pr-reviewer
spec:
  selector:
    app.kubernetes.io/name: ai-reviewer
    app.kubernetes.io/component: server
  ports:
    - name: http
      port: 3000
      targetPort: http
      protocol: TCP
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-reviewer-dashboard
  namespace: ai-reviewer
  labels:
    app.kubernetes.io/name: ai-reviewer
    app.kubernetes.io/component: dashboard
    app.kubernetes.io/part-of: ai-pr-reviewer
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: ai-reviewer
      app.kubernetes.io/component: dashboard
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ai-reviewer
        app.kubernetes.io/component: dashboard
    spec:
      containers:
        - name: dashboard
          image: ghcr.io/your-org/ai-pr-reviewer/dashboard:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
              name: http
              protocol: TCP
          env:
            - name: NEXT_PUBLIC_API_URL
              value: "http://ai-reviewer-server:3000/api/v1"
            - name: NEXTAUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: ai-reviewer-secrets
                  key: nextauth-secret
            - name: NEXTAUTH_URL
              value: "http://dashboard.example.com"
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "512Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: ai-reviewer-dashboard
  namespace: ai-reviewer
  labels:
    app.kubernetes.io/name: ai-reviewer
    app.kubernetes.io/component: dashboard
    app.kubernetes.io/part-of: ai-pr-reviewer
spec:
  selector:
    app.kubernetes.io/name: ai-reviewer
    app.kubernetes.io/component: dashboard
  ports:
    - name: http
      port: 3000
      targetPort: http
      protocol: TCP
  type: ClusterIP
