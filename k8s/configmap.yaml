apiVersion: v1
kind: ConfigMap
metadata:
  name: ai-reviewer-config
  namespace: ai-reviewer
  labels:
    app.kubernetes.io/name: ai-reviewer
    app.kubernetes.io/part-of: ai-pr-reviewer
data:
  # Server Configuration
  PORT: "3000"
  HOST: "0.0.0.0"
  LOG_LEVEL: "info"

  # AI Provider
  AI_PROVIDER: "gemini"
  AI_MODEL: "gemini-2.5-flash"
  GEMINI_TIER: "free"

  # Redis
  REDIS_HOST: "redis-master"
  REDIS_PORT: "6379"

  # Review Settings
  MIN_CONFIDENCE_THRESHOLD: "85"
  MAX_DIFF_LINES: "5000"
  POST_REVIEW_TO_GITHUB: "true"
