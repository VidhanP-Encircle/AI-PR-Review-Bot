apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ai-reviewer-ingress
  namespace: ai-reviewer
  labels:
    app.kubernetes.io/name: ai-reviewer
    app.kubernetes.io/part-of: ai-pr-reviewer
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  tls:
    - hosts:
        - api.reviewer.example.com
        - dashboard.reviewer.example.com
      secretName: ai-reviewer-tls
  rules:
    - host: api.reviewer.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: ai-reviewer-server
                port:
                  name: http
    - host: dashboard.reviewer.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: ai-reviewer-dashboard
                port:
                  name: http
