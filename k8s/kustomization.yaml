apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: ai-reviewer

resources:
  - namespace.yaml
  - configmap.yaml
  - secrets.yaml
  - deployment.yaml
  - ingress.yaml
  - redis.yaml

commonLabels:
  app.kubernetes.io/managed-by: kustomize
  app.kubernetes.io/version: "0.1.0"

# Apply secrets via kubectl before deploying:
# kubectl create namespace ai-reviewer
# kubectl create secret generic ai-reviewer-secrets --namespace ai-reviewer \
#   --from-literal=gemini-api-key=... \
#   --from-literal=anthropic-api-key=... \
#   --from-literal=openrouter-api-key=... \
#   --from-literal=github-token=... \
#   --from-literal=github-webhook-secret=... \
#   --from-literal=postgres-password=... \
#   --from-literal=redis-password=... \
#   --from-literal=nextauth-secret=... \
#   --from-literal=cookie-secret=...
# kubectl create secret generic postgres-secrets --namespace ai-reviewer \
#   --from-literal=postgres-password=...
# kubectl apply -k k8s/
