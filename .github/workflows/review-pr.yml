name: AI PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths-ignore:
      - 'docs/**'
      - '**.md'
      - '.gitignore'

env:
  NODE_VERSION: '20'

jobs:
  review:
    name: Run AI Code Review
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      checks: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Need full history for git diff

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate PR diff
        id: diff
        run: |
          git diff origin/${{ github.base_ref }}...HEAD > /tmp/pr-diff.patch
          echo "diff_lines=$(wc -l < /tmp/pr-diff.patch)" >> $GITHUB_OUTPUT

      - name: Run AI Review
        id: review
        env:
          # --- Provider Selection ---
          # Set this secret in your repo: Settings → Secrets and Variables → Actions
          # Supported: gemini (default), claude, openrouter, ollama
          AI_PROVIDER: ${{ secrets.AI_PROVIDER || 'gemini' }}

          # --- Provider API Keys ---
          # Create ONLY the secret(s) matching your chosen provider:
          # Gemini:   GEMINI_API_KEY (free at aistudio.google.com/apikey)
          # Claude:   ANTHROPIC_API_KEY
          # OpenRouter: OPENROUTER_API_KEY
          # Ollama:   not supported in GitHub Actions (needs local server)
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}

          # --- Model Configuration (Optional) ---
          # The factory picks sensible defaults per provider:
          #   Gemini:    gemini-2.5-flash
          #   Claude:    claude-opus-4-20250514
          #   OpenRouter: openai/gpt-4o-mini
          #
          # To override, uncomment and set the AI_MODEL repo secret:
          # AI_MODEL: ${{ secrets.AI_MODEL }}

          # --- Gemini-Specific ---
          # Set to "free" (default) for sequential processing to avoid rate limits
          # Set to "paid" for parallel processing
          GEMINI_TIER: ${{ secrets.GEMINI_TIER || 'free' }}

          # --- Fallback Provider (Optional) ---
          # If primary fails, automatically fall back to another provider
          # AI_FALLBACK_PROVIDER: ${{ secrets.AI_FALLBACK_PROVIDER }}
          # AI_FALLBACK_MODEL: ${{ secrets.AI_FALLBACK_MODEL }}

          # --- Ollama (NOT supported in GitHub Actions) ---
          # Ollama requires a local server. Not available in CI runners.
          # Set AI_PROVIDER to gemini, claude, or openrouter instead.

          # --- Review Thresholds ---
          MIN_CONFIDENCE_THRESHOLD: ${{ secrets.MIN_CONFIDENCE_THRESHOLD || '85' }}
        run: |
          # NO_COLOR=1 strips chalk ANSI escape codes so the output is clean for PR comments
          NO_COLOR=1 npx tsx src/cli.ts --diff /tmp/pr-diff.patch --repo . > /tmp/review-output.txt 2>&1
          echo "exit_code=$?" >> $GITHUB_OUTPUT

      - name: Post review as PR comment
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const reviewOutput = fs.readFileSync('/tmp/review-output.txt', 'utf-8');
            
            // Truncate if too long (GitHub comments have a 65536 char limit)
            const maxLength = 60000;
            const body = reviewOutput.length > maxLength
              ? reviewOutput.slice(0, maxLength) + '\n\n... (truncated)'
              : reviewOutput;
            
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `## 🤖 AI PR Review\n\n\`\`\`\n${body}\n\`\`\``
            });

      - name: Upload review artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ai-review-output
          path: /tmp/review-output.txt
