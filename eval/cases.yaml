- vars:
    scenario: "JavaScript Prototype Pollution"
    code_content: |
      function mergeObjects(target, source) {
          for (let key in source) {
              if (typeof source[key] === 'object' && source[key] !== null) {
                  if (!target[key]) target[key] = {};
                  mergeObjects(target[key], source[key]);
              } else {
                  target[key] = source[key];
              }
          }
          return target;
      }
    surrounding_context: ""
    technology_stack: '{"languages": [{"name":"JavaScript","percentage":100}], "frameworks": [], "testingLibraries": [], "packageManagers": ["npm"], "linters": []}'
  assert:
    - type: javascript
      value: |
        const data = JSON.parse(output);
        return data.findings.some(f => f.title.toLowerCase().includes('prototype') || f.title.toLowerCase().includes('pollution'));

- vars:
    scenario: "Go Loop Variable Capture (pre-Go 1.22)"
    code_content: |
      func processItems(items []string) {
          var wg sync.WaitGroup
          for _, item := range items {
              wg.Add(1)
              go func() {
                  defer wg.Done()
                  process(item)
              }()
          }
          wg.Wait()
      }
