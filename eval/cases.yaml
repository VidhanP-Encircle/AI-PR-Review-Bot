- vars:
    scenario: "React Stale Closure in useEffect"
    code_content: |
      function Counter() {
          const [count, setCount] = useState(0);
      
          useEffect(() => {
              const interval = setInterval(() => {
                  setCount(count + 1);
              }, 1000);
              return () => clearInterval(interval);
          }, []);
      
          return <div>{count}</div>;
      }
    surrounding_context: "import { useState, useEffect } from 'react';"
    technology_stack: '{"languages": [{"name":"TypeScript","percentage":100}], "frameworks": ["React"], "testingLibraries": [], "packageManagers": ["npm"], "linters": []}'
  assert:
    - type: javascript
      value: |
        const data = JSON.parse(output);
        return data.findings.some(f => f.title.toLowerCase().includes('stale') || f.title.toLowerCase().includes('closure') || f.title.toLowerCase().includes('dependency'));

- vars:
    scenario: "Hallucination Trap: Safe Command Execution"
    code_content: |
      function pingServer(hostname) {
          if (!/^[a-zA-Z0-9.-]+$/.test(hostname)) {
              throw new Error("Invalid hostname");
          }
          return child_process.execSync(`ping -c 1 ${hostname}`).toString();
      }
    surrounding_context: "const child_process = require('child_process');"
    technology_stack: '{"languages": [{"name":"JavaScript","percentage":100}], "frameworks": ["Node.js"], "testingLibraries": [], "packageManagers": ["npm"], "linters": []}'
  assert:
    - type: javascript
      value: |
        const data = JSON.parse(output);
        // It should NOT flag command injection because the regex strictly validates the input.
        const hallucinated = data.findings.some(f => f.title.toLowerCase().includes('injection') || f.title.toLowerCase().includes('vulnerability'));
        return !hallucinated;
