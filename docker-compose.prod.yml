services:
  redis:
    image: redis:7-alpine
    container_name: ai-reviewer-redis-prod
    ports:
      - '6379:6379'
    volumes:
      - redis_data_prod:/data
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 3

  postgres:
    image: postgres:16-alpine
    container_name: ai-reviewer-postgres-prod
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
      POSTGRES_DB: AiReviewBot
    volumes:
      - pg_data_prod:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d AiReviewBot']
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ai-reviewer-backend-prod
    ports:
      - '3001:3001'
    volumes:
      - repo_cache_data_prod:/app/.repo-cache
    env_file:
      - .env
    environment:
      # Override local environment settings specifically for docker networking
      - DATABASE_URL=postgresql://postgres:postgrespassword@postgres:5432/AiReviewBot
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - HOST=0.0.0.0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    container_name: ai-reviewer-dashboard-prod
    ports:
      - '3000:3000'
    environment:
      - NODE_ENV=production
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  redis_data_prod:
  pg_data_prod:
  repo_cache_data_prod:
